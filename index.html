<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Smart Home - theshysadec2004</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Cấu hình Firebase (Đã sửa lỗi trùng apiKey và thiếu appId)
        const firebaseConfig = {
            apiKey: "AIzaSyAgEfUeAZ91etsTXtZqPa_y8o7ukA2aAxw",
            authDomain: "dht11-firebase-9e9f4.firebaseapp.com",
            projectId: "dht11-firebase-9e9f4",
            storageBucket: "dht11-firebase-9e9f4.firebasestorage.app",
            messagingSenderId: "1093281193502",
            appId: "1:1093281193502:web:f8737478a5ee28c0c5180f",
            databaseURL: "https://dht11-firebase-9e9f4-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Lắng nghe dữ liệu cảm biến
        const tempRef = ref(db, 'sensor/temperature');
        const humRef = ref(db, 'sensor/humidity');

        onValue(tempRef, (snapshot) => {
            const val = snapshot.val();
            document.getElementById('tempDisplay').innerText = (val !== null ? val : "--");
        });

        onValue(humRef, (snapshot) => {
            const val = snapshot.val();
            document.getElementById('humDisplay').innerText = (val !== null ? val : "--");
        });

        // Hàm điều khiển thiết bị
        window.setMode = function(val) {
            set(ref(db, 'control/mode'), val);
            // Cập nhật giao diện nút bấm
            if(val === 0) {
                document.getElementById('btnAuto').classList.replace('btn-outline-primary', 'btn-primary');
                document.getElementById('btnManual').classList.replace('btn-secondary', 'btn-outline-secondary');
            } else {
                document.getElementById('btnAuto').classList.replace('btn-primary', 'btn-outline-primary');
                document.getElementById('btnManual').classList.replace('btn-outline-secondary', 'btn-secondary');
            }
        }

        window.controlDevice = function(device, state) {
            set(ref(db, 'control/' + device), state);
        }

        // Lắng nghe trạng thái Mode để hiển thị nút cho đúng khi mới vào web
        onValue(ref(db, 'control/mode'), (snapshot) => {
            const mode = snapshot.val();
            if (mode !== null) window.setMode(mode);
        });
    </script>

    <style>
        body { background-color: #f8f9fa; }
        .sensor-value { font-size: 2.5rem; font-weight: bold; color: #0d6efd; }
        .sensor-unit { font-size: 1.2rem; color: #6c757d; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>

    <div class="container py-5">
        <h2 class="text-center mb-5 fw-bold text-dark">Bảng Điều Khiển Nhà Thông Minh</h2>
        
        <div class="row justify-content-center g-4">
            
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm h-100 text-center">
                    <div class="card-header bg-primary text-white fw-bold">
                        Cảm Biến DHT11
                    </div>
                    <div class="card-body d-flex flex-column justify-content-center">
                        <div class="mb-3">
                            <h6 class="text-muted text-uppercase">Nhiệt độ</h6>
                            <span id="tempDisplay" class="sensor-value">--</span>
                            <span class="sensor-unit">°C</span>
                        </div>
                        <hr>
                        <div>
                            <h6 class="text-muted text-uppercase">Độ ẩm</h6>
                            <span id="humDisplay" class="sensor-value">--</span>
                            <span class="sensor-unit">%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm h-100 text-center">
                    <div class="card-header bg-dark text-white fw-bold">
                        Chế Độ Hoạt Động
                    </div>
                    <div class="card-body">
                        <p class="text-muted small mb-4">Chọn cách thức hoạt động của hệ thống.</p>
                        
                        <div class="d-grid gap-3">
                            <button id="btnAuto" class="btn btn-primary btn-lg" onclick="setMode(0)">TỰ ĐỘNG (AUTO)</button>
                            <button id="btnManual" class="btn btn-outline-secondary btn-lg" onclick="setMode(1)">THỦ CÔNG (MANUAL)</button>
                        </div>
                        
                        <div class="alert alert-info mt-4 small text-start mb-0" role="alert">
                            <strong>Auto:</strong> Tự bật còi & động cơ khi > 30°C hoặc < 5°C.
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm h-100 text-center">
                    <div class="card-header bg-warning text-dark fw-bold">
                        Điều Khiển Thủ Công
                    </div>
                    <div class="card-body">
                        <p class="text-danger small mb-3">(Chỉ hoạt động khi ở chế độ MANUAL)</p>
                        
                        <div class="mb-4">
                            <h6 class="fw-bold">Động cơ 12V (MOSFET)</h6>
                            <div class="btn-group w-100" role="group">
                                <button type="button" class="btn btn-success" onclick="controlDevice('motor', 1)">BẬT</button>
                                <button type="button" class="btn btn-danger" onclick="controlDevice('motor', 0)">TẮT</button>
                            </div>
                        </div>

                        <div>
                            <h6 class="fw-bold">Còi Buzzer</h6>
                            <div class="btn-group w-100" role="group">
                                <button type="button" class="btn btn-success" onclick="controlDevice('buzzer', 1)">BẬT</button>
                                <button type="button" class="btn btn-danger" onclick="controlDevice('buzzer', 0)">TẮT</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
