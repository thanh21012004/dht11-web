<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Smart Home - theshysadec2004</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, get, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        // Import thêm các hàm Xác thực (Auth)
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAgEfUeAZ91etsTXtZqPa_y8o7ukA2aAxw",
            authDomain: "dht11-firebase-9e9f4.firebaseapp.com",
            projectId: "dht11-firebase-9e9f4",
            storageBucket: "dht11-firebase-9e9f4.firebasestorage.app",
            messagingSenderId: "1093281193502",
            appId: "1:1093281193502:web:f8737478a5ee28c0c5180f",
            databaseURL: "https://dht11-firebase-9e9f4-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Các biến giao diện
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const statusMsg = document.getElementById('statusMsg');

        // ================= XỬ LÝ ĐĂNG NHẬP & QUYỀN ĐIỀU KHIỂN =================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Đã đăng nhập -> Kiểm tra xem có ai đang dùng hệ thống không
                const activeUserRef = ref(db, 'system/active_user');
                
                get(activeUserRef).then((snapshot) => {
                    const currentActiveUser = snapshot.val();
                    
                    if (currentActiveUser === null || currentActiveUser === user.uid) {
                        // Hệ thống đang rảnh, HOẶC chính mình đang giữ quyền -> Chiếm quyền!
                        
                        // 1. Cài đặt tự động nhả quyền khi tắt trình duyệt/mất mạng
                        onDisconnect(activeUserRef).remove().then(() => {
                            // 2. Ghi tên mình vào làm người đang điều khiển
                            set(activeUserRef, user.uid);
                            
                            // 3. Hiển thị Dashboard
                            loginSection.style.display = 'none';
                            dashboardSection.style.display = 'block';
                            document.getElementById('currentUser').innerText = user.email;
                            
                            // Bắt đầu tải dữ liệu cảm biến
                            loadDashboardData();
                        });
                    } else {
                        // CÓ NGƯỜI KHÁC ĐANG DÙNG!
                        alert("Hệ thống hiện đang được sử dụng bởi một tài khoản khác. Vui lòng quay lại sau!");
                        signOut(auth); // Ép đăng xuất ra ngoài
                    }
                }).catch((error) => {
                    console.error(error);
                });

            } else {
                // Chưa đăng nhập
                loginSection.style.display = 'block';
                dashboardSection.style.display = 'none';
            }
        });

        // Hàm Đăng nhập
        window.login = function() {
            signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
                .catch((error) => statusMsg.innerHTML = `<span class="text-danger">Lỗi: Sai email hoặc mật khẩu!</span>`);
        }

        // Hàm Đăng ký
        window.register = function() {
            createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
                .then(() => alert("Đăng ký thành công! Đang vào hệ thống..."))
                .catch((error) => statusMsg.innerHTML = `<span class="text-danger">Lỗi đăng ký: Mật khẩu cần 6 ký tự hoặc email đã tồn tại.</span>`);
        }

        // Hàm Quên mật khẩu
        window.forgotPassword = function() {
            if (!emailInput.value) {
                statusMsg.innerHTML = `<span class="text-danger">Vui lòng nhập Email để khôi phục mật khẩu!</span>`;
                return;
            }
            sendPasswordResetEmail(auth, emailInput.value)
                .then(() => statusMsg.innerHTML = `<span class="text-success">Đã gửi link đặt lại mật khẩu vào Email của bạn!</span>`)
                .catch((error) => statusMsg.innerHTML = `<span class="text-danger">Lỗi: Email không tồn tại.</span>`);
        }

        // Hàm Đăng xuất
        window.logout = function() {
            // Nhả quyền điều khiển trước khi đăng xuất
            set(ref(db, 'system/active_user'), null).then(() => {
                signOut(auth);
            });
        }

        // ================= XỬ LÝ DASHBOARD =================
        function loadDashboardData() {
            const tempRef = ref(db, 'sensor/temperature');
            const humRef = ref(db, 'sensor/humidity');

            onValue(tempRef, (snapshot) => {
                const val = snapshot.val();
                document.getElementById('tempDisplay').innerText = (val !== null ? val : "--");
            });

            onValue(humRef, (snapshot) => {
                const val = snapshot.val();
                document.getElementById('humDisplay').innerText = (val !== null ? val : "--");
            });

            onValue(ref(db, 'control/mode'), (snapshot) => {
                const mode = snapshot.val();
                if (mode !== null) updateModeUI(mode);
            });
        }

        window.setMode = function(val) {
            set(ref(db, 'control/mode'), val);
        }

        function updateModeUI(val) {
            if(val === 0) {
                document.getElementById('btnAuto').classList.replace('btn-outline-primary', 'btn-primary');
                document.getElementById('btnManual').classList.replace('btn-secondary', 'btn-outline-secondary');
            } else {
                document.getElementById('btnAuto').classList.replace('btn-primary', 'btn-outline-primary');
                document.getElementById('btnManual').classList.replace('btn-outline-secondary', 'btn-secondary');
            }
        }

        window.controlDevice = function(device, state) {
            set(ref(db, 'control/' + device), state);
        }
    </script>

    <style>
        body { background-color: #f8f9fa; }
        .sensor-value { font-size: 2.5rem; font-weight: bold; color: #0d6efd; }
        .sensor-unit { font-size: 1.2rem; color: #6c757d; }
        .card { border-radius: 15px; border: none; }
        #dashboardSection { display: none; } /* Ẩn mặc định */
    </style>
</head>
<body>

    <div id="loginSection" class="container py-5" style="max-width: 450px;">
        <div class="card shadow p-4 text-center">
            <h3 class="fw-bold mb-4 text-primary">Smart Home Login</h3>
            <p class="text-muted small mb-4">Hệ thống chỉ cho phép 1 người điều khiển tại 1 thời điểm.</p>
            
            <input type="email" id="email" class="form-control mb-3" placeholder="Nhập Email">
            <input type="password" id="password" class="form-control mb-3" placeholder="Nhập Mật khẩu">
            
            <div id="statusMsg" class="mb-3 small fw-bold"></div>
            
            <button class="btn btn-primary w-100 mb-2 fw-bold" onclick="login()">ĐĂNG NHẬP</button>
            
            <div class="d-flex justify-content-between mt-3 small">
                <a href="#" class="text-decoration-none" onclick="register()">Đăng ký tài khoản</a>
                <a href="#" class="text-decoration-none text-danger" onclick="forgotPassword()">Quên mật khẩu?</a>
            </div>
        </div>
    </div>

    <div id="dashboardSection" class="container py-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark m-0">Bảng Điều Khiển</h2>
            <div>
                <span class="badge bg-success me-2 p-2">Đang điều khiển: <span id="currentUser"></span></span>
                <button class="btn btn-danger btn-sm fw-bold" onclick="logout()">Thoát & Nhả quyền</button>
            </div>
        </div>
        
        <div class="row justify-content-center g-4">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm h-100 text-center">
                    <div class="card-header bg-primary text-white fw-bold">Cảm Biến DHT11</div>
                    <div class="card-body d-flex flex-column justify-content-center">
                        <div class="mb-3">
                            <h6 class="text-muted text-uppercase">Nhiệt độ</h6>
                            <span id="tempDisplay" class="sensor-value">--</span>
                            <span class="sensor-unit">°C</span>
                        </div>
                        <hr>
                        <div>
                            <h6 class="text-muted text-uppercase">Độ ẩm</h6>
                            <span id="humDisplay" class="sensor-value">--</span>
                            <span class="sensor-unit">%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm h-100 text-center">
                    <div class="card-header bg-dark text-white fw-bold">Chế Độ Hoạt Động</div>
                    <div class="card-body">
                        <div class="d-grid gap-3 mt-3">
                            <button id="btnAuto" class="btn btn-primary btn-lg" onclick="setMode(0)">TỰ ĐỘNG (AUTO)</button>
                            <button id="btnManual" class="btn btn-outline-secondary btn-lg" onclick="setMode(1)">THỦ CÔNG (MANUAL)</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm h-100 text-center">
                    <div class="card-header bg-warning text-dark fw-bold">Điều Khiển Thủ Công</div>
                    <div class="card-body mt-3">
                        <div class="mb-4">
                            <h6 class="fw-bold">Động cơ 12V (MOSFET)</h6>
                            <div class="btn-group w-100">
                                <button type="button" class="btn btn-success" onclick="controlDevice('motor', 1)">BẬT</button>
                                <button type="button" class="btn btn-danger" onclick="controlDevice('motor', 0)">TẮT</button>
                            </div>
                        </div>
                        <div>
                            <h6 class="fw-bold">Còi Buzzer</h6>
                            <div class="btn-group w-100">
                                <button type="button" class="btn btn-success" onclick="controlDevice('buzzer', 1)">BẬT</button>
                                <button type="button" class="btn btn-danger" onclick="controlDevice('buzzer', 0)">TẮT</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
